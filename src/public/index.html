<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat SENA - Tiempo Real</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="main.css">
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">

                <div id="nickname-container" class="card shadow">
                    <div class="card-header bg-dark text-white">
                        <h4 class="mb-0"><i class="fa-regular fa-comment me-2"></i>Chat SENA - Ingresa</h4>
                    </div>
                    <div class="card-body">
                        <form id="nickname-form">
                            <div class="mb-3">
                                <label for="nickname-input" class="form-label">Elige un apodo para comenzar:</label>
                                <input type="text" class="form-control" id="nickname-input" placeholder="Ej: Aprendiz2024" required>
                            </div>
                            <div id="nickname-error" class="alert alert-danger d-none" role="alert"></div>
                            <button type="submit" class="btn btn-dark w-100">Entrar al Chat</button>
                        </form>
                    </div>
                </div>


                <div id="chat-container" class="card shadow d-none">
                    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                        <h4 class="mb-0"><i class="fa-regular fa-comments me-2"></i>Chat en Vivo</h4>
                        <span id="user-count" class="badge bg-light text-dark">0 usuarios</span>
                    </div>
                    <div class="row g-0">
                    
                        <div class="col-4 border-end">
                            <div class="p-2 bg-secondary bg-opacity-10 fw-bold">Conectados</div>
                            <ul id="user-list" class="list-unstyled p-2">
                        
                            </ul>
                        </div>
                
                        <div class="col-8">
                            <div id="messages" class="p-3" style="height: 300px; overflow-y: auto;">
                    
                            </div>
                            <form id="message-form" class="p-2 border-top">
                                <div class="input-group">
                                    <input type="text" id="message-input" class="form-control" placeholder="Escribe tu mensaje..." autocomplete="off">
                                    <button class="btn btn-dark" type="submit" id="send-button">
                                        <i class="fa-regular fa-paper-plane"></i> Enviar
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>


    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="/socket.io/socket.io.js"></script>

    <script src="main.js"></script>
</body>
</html>
